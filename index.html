<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Season of Wine</title>
  <link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Merriweather:wght@700,900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #6b0f1a;
    }

    .banner {
      position: relative;
      width: 100vw;
      height: 100vh;
      /* Remplace 'bg.jpg' par le chemin de ton image de fond */
      background-image: url('bg.jpg');
      background-size: cover;
      background-position: center;
      overflow: hidden;
    }

    .text-block {
      position: absolute;
      top: 50%;
      left: 8%;
      transform: translateY(-50%);
      color: #fff;
    }

    .title {
      font-family: 'Merriweather', serif;
      font-weight: 900;
      font-size: clamp(36px, 5vw, 72px);
      line-height: 1.05;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 1px 2px 8px rgba(0,0,0,0.4);
    }

    .subtitle {
      font-family: 'Parisienne', cursive;
      font-size: clamp(22px, 3vw, 44px);
      margin-top: 4px;
      text-shadow: 1px 2px 6px rgba(0,0,0,0.35);
    }

    .date-box {
      display: inline-flex;
      align-items: center;
      margin-top: 20px;
      border: 2px solid #fff;
      color: #fff;
      font-family: 'Merriweather', serif;
      font-weight: 700;
      font-size: clamp(12px, 1.4vw, 18px);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .date-box span {
      padding: 8px 20px;
    }

    .btn-commencer {
      display: inline-block;
      margin-top: 24px;
      padding: 14px 40px;
      background-color: #6b0f1a;
      color: #fff;
      font-family: 'Merriweather', serif;
      font-weight: 700;
      font-size: clamp(12px, 1.2vw, 16px);
      letter-spacing: 3px;
      text-transform: uppercase;
      text-decoration: none;
      border: 2px solid #fff;
      transition: background 0.3s, color 0.3s;
    }

    .btn-commencer:hover {
      background-color: #fff;
      color: #6b0f1a;
    }

    .date-box .divider {
      width: 1px;
      align-self: stretch;
      background: #fff;
      padding: 0;
    }
  </style>
</head>
<body>
  <div class="banner">
    <div class="text-block">
      <div class="title">Season<br>of Wine</div>
      <div class="subtitle">Special Event</div>
      <div class="date-box">
        <span>24 Nov</span>
        <span class="divider"></span>
        <span>At 2:00 PM</span>
      </div>
      <a href="dashboard.html" class="btn-commencer">Commencer</a>
    </div>
  </div>
</body>
</html>
